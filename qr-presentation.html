<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CyberSecuQuiz - Presentation Access</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-align: center;
            padding: 20px;
        }
        .container {
            background: rgba(255, 255, 255, 0.95);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 500px;
            width: 100%;
        }
        h1 { color: #2563eb; font-size: 2.5rem; margin-bottom: 10px; }
        .subtitle { color: #64748b; font-size: 1.2rem; margin-bottom: 30px; }
        #qrcode {
            margin: 20px auto;
            padding: 20px;
            background: white;
            border-radius: 12px;
            display: inline-block;
        }
        .url-display {
            margin-top: 20px;
            padding: 15px;
            background: #f1f5f9;
            border-radius: 8px;
            color: #334155;
            font-family: monospace;
            font-size: 0.85rem;
            word-break: break-all;
        }
        .footer { margin-top: 30px; color: #94a3b8; font-size: 0.9rem; }
        .badge {
            display: inline-block;
            background: #10b981;
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="badge">🔒 Live Demo</div>
        <h1>CyberSecuQuiz</h1>
        <p class="subtitle">Scan to test your cybersecurity knowledge</p>
        <div id="qrcode"></div>
        <div class="url-display">https://plusive27-max.github.io/cybersecuquiz/</div>
        <p class="footer">Foundation Year Cybersecurity Project | Solent University | 2026</p>
    </div>
    <script>
        new QRCode(document.getElementById('qrcode'), {
            text: 'https://plusive27-max.github.io/cybersecuquiz/',
            width: 300,
            height: 300,
            colorDark: '#2563eb',
            colorLight: '#ffffff',
            correctLevel: QRCode.CorrectLevel.H
        });
    </script>
</body>
</html>
