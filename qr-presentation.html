<!DOCTYPE html>
<html>
<head>
    <title>CyberSecuQuiz - Presentation Access</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f8fafc;
            margin: 0;
        }
        #qrcode {
            margin: 20px;
            padding: 30px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h1 { color: #2563eb; margin-bottom: 10px; }
        p { color: #64748b; font-size: 1.1rem; }
        .footer {
            margin-top: 30px;
            font-size: 0.9rem;
            color: #94a3b8;
        }
    </style>
</head>
<body>
    <h1>🔒 CyberSecuQuiz</h1>
    <p>Scan to start your cybersecurity assessment</p>
    <div id="qrcode"></div>
    <p class="footer">Foundation Year Project | Solent University | 2026</p>
    
    <script>
        // REPLACE THIS WITH YOUR ACTUAL LIVE URL
        const liveUrl = 'https://YOUR-URL.netlify.app'; // <-- CHANGE THIS
        
        new QRCode(document.getElementById('qrcode'), {
            text: liveUrl,
            width: 300,
            height: 300,
            colorDark: '#2563eb',
            colorLight: '#ffffff',
            correctLevel: QRCode.CorrectLevel.H
        });
    </script>
</body>
</html>
